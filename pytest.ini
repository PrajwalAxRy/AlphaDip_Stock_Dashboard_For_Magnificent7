[pytest]
testpaths = tests
addopts =
    --strict-markers
    --cov=engine
    --cov=database
    --cov=cron_job
    --cov=services
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
markers =
    unit: Unit tests that run without external services.
    integration: Integration tests that may use real infrastructure.
    e2e: End-to-end tests for user flows.
    slow: Tests that take more than a few seconds to run.
